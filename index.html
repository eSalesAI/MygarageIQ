<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GarageIQ</title>
<style>
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#efefec;--text:#1a1a18;--text2:#6b6b67;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--accent:#185FA5;--accent-dark:#0C447C;--red:#A32D2D;--red-bg:#FCEBEB;--red-border:#F7C1C1;--amber:#854F0B;--amber-bg:#FAEEDA;--green:#3B6D11;--green-bg:#EAF3DE;--blue:#185FA5;--blue-bg:#E6F1FB;--purple:#3C3489;--purple-bg:#EEEDFE;--r:10px;--rs:7px;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0efe8;--text2:#a0a09a;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--red-bg:#3a1515;--amber-bg:#3a2a08;--green-bg:#1a2e0a;--blue-bg:#0c2640;--purple-bg:#1e1a40;}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:50;}
.logo{font-size:18px;font-weight:700;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.app{max-width:1000px;margin:0 auto;padding:1.5rem 1rem 4rem;}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--bg2);border-radius:var(--r);padding:4px;width:fit-content;}
.tab{padding:7px 18px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);border-radius:var(--rs);transition:all .15s;}
.tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12);}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.metric{background:var(--bg);border-radius:var(--r);padding:1rem 1.25rem;border:1px solid var(--border);}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:4px;}
.metric-value{font-size:26px;font-weight:700;}
.vehicle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;margin-bottom:1.5rem;}
.vehicle-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.vehicle-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:var(--border2);}
.vc-photo-wrap{position:relative;height:150px;overflow:hidden;background:var(--bg2);}
.vc-photo-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.vehicle-card:hover .vc-photo-wrap img{transform:scale(1.03);}
.vc-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;}
.vc-photo-btn{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:6px;font-size:11px;padding:4px 10px;cursor:pointer;}
.vc-body{padding:.85rem 1rem 1rem;}
.vc-header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.vc-name{font-size:15px;font-weight:700;}
.vc-trim{font-size:12px;color:var(--text2);}
.vc-mileage{font-size:12px;color:var(--text2);margin:6px 0;}
.vc-lease{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.vc-lease-label{font-size:11px;color:var(--text2);}
.vc-lease-date{font-size:12px;font-weight:600;}
.vc-alerts{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;display:inline-flex;align-items:center;}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-purple{background:var(--purple-bg);color:var(--purple);}
.section-title{font-size:15px;font-weight:700;margin-bottom:.75rem;}
.service-list{display:flex;flex-direction:column;gap:8px;}
.service-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:.8rem 1rem;display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;}
.si-name{font-size:14px;font-weight:600;}
.si-due{font-size:12px;color:var(--text2);margin-top:2px;}
.progress-bar{height:4px;background:var(--bg2);border-radius:99px;margin-top:5px;overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;}
.history-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:10px;}
.history-header{display:flex;justify-content:space-between;align-items:flex-start;}
.history-name{font-size:14px;font-weight:700;}
.history-meta{font-size:12px;color:var(--text2);margin-top:3px;}
.history-detail{font-size:13px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.6;}
.history-detail-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:4px;}
.btn{padding:7px 14px;font-size:13px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);cursor:pointer;font-weight:500;transition:all .12s;}
.btn:hover{background:var(--bg2);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent-dark);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red-border);}
.btn-success{background:var(--green-bg);color:var(--green);border-color:#C0DD97;}
.btn-outline{background:transparent;color:var(--text2);border-color:var(--border2);}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;font-weight:600;border:1px solid var(--accent);border-radius:var(--rs);background:var(--accent);color:#fff;cursor:pointer;}
.add-btn:hover{background:var(--accent-dark);}
.empty-state{text-align:center;padding:4rem 1rem;color:var(--text2);}
.empty-icon{font-size:48px;margin-bottom:1rem;}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:.5rem;}
.sep{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
.cost-summary{font-size:13px;color:var(--text2);margin-bottom:1rem;}
.cost-summary strong{color:var(--text);}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.sync-bar{background:var(--blue-bg);border:1px solid rgba(24,95,165,.25);border-radius:var(--r);padding:.85rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.sync-bar-text{flex:1;font-size:13px;color:var(--blue);}
.sync-bar-text strong{display:block;font-size:14px;margin-bottom:2px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;z-index:300;overflow-y:auto;}
.modal{background:var(--bg);border-radius:var(--r);border:1px solid var(--border);padding:1.75rem;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-title{font-size:17px;font-weight:700;margin-bottom:1.25rem;}
.form-group{margin-bottom:.85rem;}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em;}
input,select,textarea{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:inherit;transition:border-color .12s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
textarea{resize:vertical;min-height:80px;line-height:1.5;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.sync-code{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:.75rem;font-family:monospace;font-size:11px;word-break:break-all;max-height:120px;overflow-y:auto;margin:.5rem 0;}
@media(max-width:600px){.summary-grid{grid-template-columns:repeat(2,1fr);}.topbar{padding:0 1rem;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">🔧 GarageIQ</div>
  <div class="topbar-right">
    <button class="btn btn-sm btn-outline" onclick="openSync()">📱 Sync devices</button>
    <button class="btn btn-sm btn-success" onclick="exportData()">💾 Backup</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="add-btn" onclick="openAddVehicle()">+ Add vehicle</button>
  </div>
</div>

<div class="app">
  <div class="sync-bar">
    <div style="font-size:24px">📱</div>
    <div class="sync-bar-text">
      <strong>Use on all your devices</strong>
      Click "Sync devices" to copy your data to your phone or any other device instantly.
    </div>
    <button class="btn btn-sm btn-primary" onclick="openSync()">Sync now</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('dashboard',this)">Dashboard</button>
    <button class="tab" onclick="setTab('schedule',this)">Service schedule</button>
    <button class="tab" onclick="setTab('history',this)">Service history</button>
  </div>

  <div id="view-dashboard">
    <div class="summary-grid" id="summary-grid"></div>
    <div class="section-title">Your vehicles</div>
    <div class="vehicle-grid" id="vehicle-grid"></div>
    <div id="alerts-section"></div>
  </div>
  <div id="view-schedule" style="display:none">
    <div class="toolbar">
      <div class="section-title" style="margin:0">Upcoming services</div>
      <select id="schedule-vehicle-filter" onchange="renderSchedule()" style="width:auto;font-size:13px;padding:7px 11px;"></select>
    </div>
    <div id="schedule-list"></div>
  </div>
  <div id="view-history" style="display:none">
    <div class="toolbar">
      <div class="section-title" style="margin:0">Service history</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <select id="history-vehicle-filter" onchange="renderHistory()" style="width:auto;font-size:13px;padding:7px 11px;"></select>
        <button class="add-btn" onclick="openLogService()">+ Log service</button>
      </div>
    </div>
    <div class="cost-summary" id="cost-summary"></div>
    <div id="history-list"></div>
  </div>
</div>
<div id="modal-container"></div>
<div class="toast" id="toast"></div>

<script>
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

// ── State & Storage ──────────────────────────────────────
let state={vehicles:[],history:[],activeTab:'dashboard'};
function save(){try{localStorage.setItem('giq_v',JSON.stringify(state.vehicles));localStorage.setItem('giq_h',JSON.stringify(state.history));}catch(e){}}
function load(){try{const v=localStorage.getItem('giq_v'),h=localStorage.getItem('giq_h');if(v)state.vehicles=JSON.parse(v);if(h)state.history=JSON.parse(h);}catch(e){}}

// ── Backup / Restore ─────────────────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),vehicles:state.vehicles,history:state.history},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`GarageIQ-backup-${new Date().toISOString().split('T')[0]}.json`;a.click();
  showToast('✅ Backup downloaded!');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.vehicles||!d.history)throw new Error();
      if(!confirm(`Restore ${d.vehicles.length} vehicle(s) and ${d.history.length} record(s)? This replaces current data.`))return;
      state.vehicles=d.vehicles;state.history=d.history;save();
      renderDashboard();showToast(`✅ Restored ${d.vehicles.length} vehicles!`);
    }catch{alert('Invalid backup file.');}
  };
  reader.readAsText(file);
}

// ── Sync between devices ─────────────────────────────────
function openSync(){
  const data=JSON.stringify({vehicles:state.vehicles,history:state.history});
  const b64=btoa(unescape(encodeURIComponent(data)));
  showModal(`
    <div class="modal-title">📱 Sync to another device</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6">Choose how to transfer your data to your phone or another device:</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:1.25rem">
      <button class="btn btn-primary" onclick="exportData();closeModal()">⬇ Download backup file → open on other device and tap Restore</button>
      <div style="border:1px solid var(--border);border-radius:var(--rs);padding:1rem;">
        <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem">Or paste this code on your other device</div>
        <div class="sync-code" id="sync-code-display">${b64.substring(0,100)}... (${Math.round(b64.length/1024)}KB)</div>
        <button class="btn btn-sm" style="margin-top:6px" onclick="navigator.clipboard.writeText('${b64}').then(()=>showToast('Code copied!'))">Copy full sync code</button>
      </div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:.75rem 0">
    <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem">Paste sync code from another device</div>
    <textarea id="sync-paste" placeholder="Paste sync code here..." style="min-height:60px"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="importSyncCode()">Import from code</button>
    </div>
  `);
}
function importSyncCode(){
  try{
    const code=document.getElementById('sync-paste').value.trim();
    const data=JSON.parse(decodeURIComponent(escape(atob(code))));
    if(!data.vehicles)throw new Error();
    if(!confirm(`Import ${data.vehicles.length} vehicle(s) and ${data.history.length} record(s)?`))return;
    state.vehicles=data.vehicles;state.history=data.history;save();
    closeModal();renderDashboard();showToast('✅ Data imported!');
  }catch{alert('Invalid sync code. Try the backup file method instead.');}
}

const MONTHS_LIST=['January','February','March','April','May','June','July','August','September','October','November','December'];

function getSchedule(make){const k=(make||'').toLowerCase();for(const key of Object.keys(SCHEDULES)){if(key!=='default'&&k.includes(key))return SCHEDULES[key];}return SCHEDULES.default;}
function milesSince(v,sid){const r=state.history.filter(h=>h.vehicleId===v.id&&h.serviceId===sid);if(!r.length)return v.mileage;return v.mileage-r.sort((a,b)=>b.mileage-a.mileage)[0].mileage;}
function lastDate(v,sid){const r=state.history.filter(h=>h.vehicleId===v.id&&h.serviceId===sid);if(!r.length)return null;return r.sort((a,b)=>new Date(b.date)-new Date(a.date))[0].date;}
function moSince(d){if(!d)return 999;return(new Date()-new Date(d))/(1000*60*60*24*30);}
function getStatus(v,s){const ms=milesSince(v,s.id),mo=moSince(lastDate(v,s.id));const pct=Math.max(ms/s.intervalMiles,mo/s.intervalMonths);return{status:pct>=1?'overdue':pct>=0.8?'due-soon':'ok',label:pct>=1?'Overdue':pct>=0.8?'Due soon':'OK',pct:Math.min(pct,1),milesUntil:Math.max(0,s.intervalMiles-ms),milesSince:ms};}
function leaseInfo(v){if(!v.leaseEndMonth||!v.leaseEndYear)return null;return{months:Math.round((new Date(v.leaseEndYear,v.leaseEndMonth-1,1)-new Date())/(1000*60*60*24*30))};}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.querySelectorAll('[id^="view-"]').forEach(v=>v.style.display='none');
  document.getElementById('view-'+tab).style.display='block';state.activeTab=tab;
  if(tab==='dashboard')renderDashboard();else if(tab==='schedule')renderSchedule();else renderHistory();
}

function renderDashboard(){
  const all=[];state.vehicles.forEach(v=>getSchedule(v.make).forEach(s=>all.push({vehicle:v,service:s,...getStatus(v,s)})));
  const overdue=all.filter(x=>x.status==='overdue').length,dueSoon=all.filter(x=>x.status==='due-soon').length;
  const spent=state.history.reduce((a,h)=>a+(parseFloat(h.cost)||0),0);
  document.getElementById('summary-grid').innerHTML=`<div class="metric"><div class="metric-label">Vehicles</div><div class="metric-value">${state.vehicles.length}</div></div><div class="metric"><div class="metric-label">Overdue</div><div class="metric-value" style="color:var(--red)">${overdue}</div></div><div class="metric"><div class="metric-label">Due soon</div><div class="metric-value" style="color:var(--amber)">${dueSoon}</div></div><div class="metric"><div class="metric-label">Total spent</div><div class="metric-value">$${Math.round(spent).toLocaleString()}</div></div>`;
  const vg=document.getElementById('vehicle-grid');
  if(!state.vehicles.length){vg.innerHTML='<div class="empty-state"><div class="empty-icon">🚗</div><div class="empty-title">No vehicles yet</div><p>Click "+ Add vehicle" to get started.</p></div>';document.getElementById('alerts-section').innerHTML='';return;}
  vg.innerHTML=state.vehicles.map(v=>vehicleCardHTML(v)).join('');
  const urgent=all.filter(x=>x.status==='overdue'||x.status==='due-soon').slice(0,8);
  document.getElementById('alerts-section').innerHTML=urgent.length?`<hr class="sep"><div class="section-title">Needs attention now</div><div class="service-list">${urgent.map(x=>svcRowHTML(x.vehicle,x.service,x)).join('')}</div>`:'';
}

function vehicleCardHTML(v){
  const photo=v.customPhoto||getCarPhoto(v.make,v.model),fb=getFB(v.make);
  const svcs=getSchedule(v.make).map(s=>({...s,...getStatus(v,s)}));
  const ov=svcs.filter(s=>s.status==='overdue').length,ds=svcs.filter(s=>s.status==='due-soon').length;
  const li=leaseInfo(v);let lbadge='';
  if(li){if(li.months<=0)lbadge='<span class="badge badge-red">Ended</span>';else if(li.months<=3)lbadge=`<span class="badge badge-red">${li.months}mo left</span>`;else if(li.months<=6)lbadge=`<span class="badge badge-amber">${li.months}mo left</span>`;else lbadge=`<span class="badge badge-purple">${li.months}mo left</span>`;}
  const leaseDate=(v.leaseEndMonth&&v.leaseEndYear)?`${MONTHS_LIST[v.leaseEndMonth-1]} ${v.leaseEndYear}`:'';
  const leaseLabel=v.leaseType==='payout'?'Loan payout':v.leaseType==='lease'?'Lease end':'';
  const photoSection=photo?`<img src="${photo}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="vc-fallback" style="display:none">${fb}</div>`:`<div class="vc-fallback">${fb}</div>`;
  return `<div class="vehicle-card" onclick="goToSchedule('${v.id}')"><div class="vc-photo-wrap">${photoSection}<button class="vc-photo-btn" onclick="event.stopPropagation();uploadPhoto('${v.id}')">📷 Change photo</button></div><div class="vc-body"><div class="vc-header-row"><div><div class="vc-name">${escHtml(v.year+' '+v.make+' '+v.model)}</div>${v.trim?`<div class="vc-trim">${escHtml(v.trim)}</div>`:''}</div><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteVehicle('${v.id}')">Remove</button></div><div class="vc-mileage">${Number(v.mileage).toLocaleString()} miles${v.nickname?' · '+escHtml(v.nickname):''}</div>${leaseLabel&&leaseDate?`<div class="vc-lease"><span class="vc-lease-label">${leaseLabel}:</span><span class="vc-lease-date">${leaseDate}</span>${lbadge}</div>`:''}<div class="vc-alerts">${ov?`<span class="badge badge-red">${ov} overdue</span>`:''}${ds?`<span class="badge badge-amber">${ds} due soon</span>`:''}${!ov&&!ds?'<span class="badge badge-green">All good</span>':''}</div></div></div>`;
}

function svcRowHTML(vehicle,svc,st){
  const bc=st.status==='overdue'?'badge-red':st.status==='due-soon'?'badge-amber':'badge-green';
  const fc=st.status==='overdue'?'#E24B4A':st.status==='due-soon'?'#BA7517':'#639922';
  const due=st.status==='overdue'?`${Math.round(st.milesSince-svc.intervalMiles).toLocaleString()} mi overdue`:st.milesUntil>0?`in ~${Math.round(st.milesUntil).toLocaleString()} mi`:'due now';
  return `<div class="service-item"><div><div class="si-name">${escHtml(svc.name)} <span style="font-size:12px;font-weight:400;color:var(--text2)">· ${escHtml(vehicle.year+' '+vehicle.make+' '+vehicle.model)}</span></div><div class="si-due">${due}${svc.note?' · '+escHtml(svc.note):''}</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.round(st.pct*100)}%;background:${fc}"></div></div></div><span class="badge ${bc}">${st.label}</span><button class="btn btn-primary btn-sm" style="white-space:nowrap" onclick="logServiceQuick('${vehicle.id}','${svc.id}')">Log done</button></div>`;
}

function goToSchedule(id){window._scheduleTarget=id;document.querySelectorAll('.tab')[1].click();}

function renderSchedule(){
  const sel=document.getElementById('schedule-vehicle-filter');
  sel.innerHTML='<option value="all">All vehicles</option>'+state.vehicles.map(v=>`<option value="${v.id}">${escHtml(v.year+' '+v.make+' '+v.model)}</option>`).join('');
  if(window._scheduleTarget){sel.value=window._scheduleTarget;window._scheduleTarget=null;}
  const fv=sel.value||'all',vehicles=fv==='all'?state.vehicles:state.vehicles.filter(v=>v.id===fv);
  const list=document.getElementById('schedule-list');
  if(!vehicles.length){list.innerHTML='<div class="empty-state"><div class="empty-title">No vehicles added yet</div></div>';return;}
  let html='';
  vehicles.forEach(v=>{const svcs=getSchedule(v.make).map(s=>({...s,...getStatus(v,s)})).sort((a,b)=>b.pct-a.pct);if(fv==='all')html+=`<div style="font-size:13px;font-weight:600;margin:1.25rem 0 .5rem;color:var(--text2)">${escHtml(v.year+' '+v.make+' '+v.model)} · ${Number(v.mileage).toLocaleString()} mi</div>`;html+=`<div class="service-list" style="margin-bottom:1rem">${svcs.map(s=>svcRowHTML(v,s,s)).join('')}</div>`;});
  list.innerHTML=html;
}

function renderHistory(){
  const sel=document.getElementById('history-vehicle-filter');
  sel.innerHTML='<option value="all">All vehicles</option>'+state.vehicles.map(v=>`<option value="${v.id}">${escHtml(v.year+' '+v.make+' '+v.model)}</option>`).join('');
  const fv=sel.value||'all',recs=state.history.filter(h=>fv==='all'||h.vehicleId===fv).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const spent=recs.reduce((a,h)=>a+(parseFloat(h.cost)||0),0);
  document.getElementById('cost-summary').innerHTML=recs.length?`${recs.length} record${recs.length>1?'s':''} &nbsp;·&nbsp; Total spent: <strong>$${spent.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</strong>`:'';
  const list=document.getElementById('history-list');
  if(!recs.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No service records yet</div><p>Log your first service above.</p></div>';return;}
  list.innerHTML=recs.map(r=>{const v=state.vehicles.find(x=>x.id===r.vehicleId);const vn=v?escHtml(v.year+' '+v.make+' '+v.model):'Unknown vehicle';return `<div class="history-card"><div class="history-header"><div><div class="history-name">${escHtml(r.serviceName)}</div><div class="history-meta">${vn} &nbsp;·&nbsp; ${r.date} &nbsp;·&nbsp; ${Number(r.mileage).toLocaleString()} mi${r.shop?' &nbsp;·&nbsp; '+escHtml(r.shop):''}</div>${r.cost?`<span class="badge badge-blue" style="margin-top:6px;display:inline-flex">$${parseFloat(r.cost).toFixed(2)}</span>`:''}</div><button class="btn btn-sm btn-danger" onclick="deleteHistory('${r.id}')">Remove</button></div>${r.workDone?`<div class="history-detail"><div class="history-detail-label">What was done</div>${escHtml(r.workDone)}</div>`:''} ${r.notes?`<div class="history-detail"><div class="history-detail-label">Notes</div>${escHtml(r.notes)}</div>`:''}</div>`;}).join('');
}

function openAddVehicle(){
  const years=[];for(let y=2026;y>=1990;y--)years.push(y);
  const mOpts=MONTHS_LIST.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');
  const yOpts=[];for(let y=2024;y<=2035;y++)yOpts.push(`<option value="${y}">${y}</option>`);
  showModal(`<div class="modal-title">Add a vehicle</div><div class="form-row"><div class="form-group"><label class="form-label">Year</label><select id="v-year">${years.map(y=>`<option value="${y}">${y}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Make</label><select id="v-make">${MAKES.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div></div><div class="form-row"><div class="form-group"><label class="form-label">Model</label><input id="v-model" placeholder="Camry, 500, Civic..."></div><div class="form-group"><label class="form-label">Trim (optional)</label><input id="v-trim" placeholder="LE, Sport, Abarth..."></div></div><div class="form-row"><div class="form-group"><label class="form-label">Current mileage</label><input id="v-mileage" type="number" placeholder="45000"></div><div class="form-group"><label class="form-label">Nickname (optional)</label><input id="v-nickname" placeholder="My daily driver"></div></div><hr style="border:none;border-top:1px solid var(--border);margin:.75rem 0"><div class="form-group"><label class="form-label">Lease / Loan type</label><select id="v-lease-type"><option value="">Owned outright / none</option><option value="lease">Lease — tracking end date</option><option value="payout">Loan — tracking payout date</option></select></div><div id="v-lease-fields" style="display:none"><div class="form-row"><div class="form-group"><label class="form-label">End month</label><select id="v-lease-month">${mOpts}</select></div><div class="form-group"><label class="form-label">End year</label><select id="v-lease-year">${yOpts.join('')}</select></div></div></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addVehicle()">Add vehicle</button></div>`);
  document.getElementById('v-lease-type').addEventListener('change',function(){document.getElementById('v-lease-fields').style.display=this.value?'block':'none';});
}

function addVehicle(){
  const year=document.getElementById('v-year').value,make=document.getElementById('v-make').value;
  const model=document.getElementById('v-model').value.trim(),trim=document.getElementById('v-trim').value.trim();
  const mileage=parseInt(document.getElementById('v-mileage').value),nickname=document.getElementById('v-nickname').value.trim();
  const leaseType=document.getElementById('v-lease-type').value;
  const leaseEndMonth=leaseType?parseInt(document.getElementById('v-lease-month').value):null;
  const leaseEndYear=leaseType?parseInt(document.getElementById('v-lease-year').value):null;
  if(!model||!mileage){alert('Please fill in model and mileage.');return;}
  state.vehicles.push({id:Date.now().toString(),year,make,model,trim,mileage,nickname,leaseType,leaseEndMonth,leaseEndYear,customPhoto:null});
  save();closeModal();renderDashboard();showToast('✅ Vehicle saved!');
}

function deleteVehicle(id){
  if(!confirm('Remove this vehicle and all its records?'))return;
  state.vehicles=state.vehicles.filter(v=>v.id!==id);state.history=state.history.filter(h=>h.vehicleId!==id);
  save();renderDashboard();showToast('Vehicle removed.');
}

function uploadPhoto(vehicleId){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{const file=e.target.files[0];if(!file)return;const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{const canvas=document.createElement('canvas');const MAX=600;let w=img.width,h=img.height;if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);const dataUrl=canvas.toDataURL('image/jpeg',.75);URL.revokeObjectURL(url);const v=state.vehicles.find(x=>x.id===vehicleId);if(v){v.customPhoto=dataUrl;save();renderDashboard();showToast('📷 Photo saved!');}};img.src=url;};
  inp.click();
}

function logServiceQuick(vehicleId,serviceId){openLogService(vehicleId,serviceId);}
function openLogService(vehicleId,serviceId){
  if(!state.vehicles.length){alert('Add a vehicle first.');return;}
  const today=new Date().toISOString().split('T')[0];
  const allSvc=[];Object.values(SCHEDULES).forEach(sch=>sch.forEach(s=>{if(!allSvc.find(a=>a.id===s.id))allSvc.push(s);}));
  showModal(`<div class="modal-title">Log a service</div><div class="form-group"><label class="form-label">Vehicle</label><select id="ls-vehicle">${state.vehicles.map(v=>`<option value="${v.id}" ${v.id===vehicleId?'selected':''}>${escHtml(v.year+' '+v.make+' '+v.model)}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Service type</label><select id="ls-service">${allSvc.map(s=>`<option value="${s.id}" ${s.id===serviceId?'selected':''}>${escHtml(s.name)}</option>`).join('')}<option value="other">Other / custom</option></select></div><div class="form-group" id="ls-custom-wrap" style="display:none"><label class="form-label">Custom service name</label><input id="ls-custom" placeholder="e.g. Alignment, AC recharge..."></div><div class="form-row"><div class="form-group"><label class="form-label">Date of service</label><input id="ls-date" type="date" value="${today}"></div><div class="form-group"><label class="form-label">Mileage at service</label><input id="ls-mileage" type="number" placeholder="45000"></div></div><div class="form-row"><div class="form-group"><label class="form-label">Total cost ($)</label><input id="ls-cost" type="number" step="0.01" placeholder="0.00"></div><div class="form-group"><label class="form-label">Shop / mechanic</label><input id="ls-shop" placeholder="Dealer, Jiffy Lube..."></div></div><div class="form-group"><label class="form-label">Exactly what was done</label><textarea id="ls-workdone" placeholder="e.g. Replaced engine oil with 5W-30 Mobil 1 full synthetic, installed new OEM oil filter..."></textarea></div><div class="form-group"><label class="form-label">Tech notes / observations</label><textarea id="ls-notes" placeholder="e.g. Tech noticed front brake pads at 3mm — recommend replacing within 6 months." style="min-height:60px"></textarea></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="logService()">Save record</button></div>`);
  document.getElementById('ls-service').addEventListener('change',function(){document.getElementById('ls-custom-wrap').style.display=this.value==='other'?'block':'none';});
  const vSel=document.getElementById('ls-vehicle'),mFld=document.getElementById('ls-mileage');
  function prefill(){const v=state.vehicles.find(x=>x.id===vSel.value);if(v&&!mFld.value)mFld.value=v.mileage;}
  prefill();vSel.addEventListener('change',prefill);
}

function logService(){
  const vehicleId=document.getElementById('ls-vehicle').value;
  const sid=document.getElementById('ls-service').value,isCustom=sid==='other';
  const sname=isCustom?document.getElementById('ls-custom').value.trim():document.getElementById('ls-service').options[document.getElementById('ls-service').selectedIndex].text;
  const date=document.getElementById('ls-date').value,mileage=parseInt(document.getElementById('ls-mileage').value);
  const cost=document.getElementById('ls-cost').value,shop=document.getElementById('ls-shop').value.trim();
  const workDone=document.getElementById('ls-workdone').value.trim(),notes=document.getElementById('ls-notes').value.trim();
  if(!sname||!date||!mileage){alert('Please fill in service type, date, and mileage.');return;}
  state.history.push({id:Date.now().toString(),vehicleId,serviceId:isCustom?'custom_'+Date.now():sid,serviceName:sname,date,mileage,cost:cost||null,shop:shop||null,workDone:workDone||null,notes:notes||null});
  const v=state.vehicles.find(x=>x.id===vehicleId);if(v&&mileage>v.mileage)v.mileage=mileage;
  save();closeModal();
  if(state.activeTab==='history')renderHistory();else renderDashboard();
  showToast('✅ Service record saved!');
}

function deleteHistory(id){
  if(!confirm('Remove this record?'))return;
  state.history=state.history.filter(h=>h.id!==id);save();renderHistory();showToast('Record removed.');
}

function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-container').innerHTML='';}

load();
renderDashboard();
</script>
</body>
</html>
