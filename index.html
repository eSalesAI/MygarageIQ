<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GarageIQ</title>
<style>
body{font-family:sans-serif;background:#1c1c1a;color:#f0efe8;margin:0;padding:2rem;}
.box{max-width:500px;margin:2rem auto;background:#252523;padding:2rem;border-radius:12px;}
input{width:100%;padding:10px;font-size:14px;border:1px solid #444;border-radius:6px;background:#1c1c1a;color:#f0efe8;margin:8px 0 16px;box-sizing:border-box;}
button{width:100%;padding:12px;font-size:15px;font-weight:700;background:#185FA5;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.err{color:#E24B4A;margin-top:1rem;font-size:13px;display:none;}
.log{background:#111;padding:1rem;border-radius:6px;margin-top:1rem;font-family:monospace;font-size:12px;min-height:60px;white-space:pre-wrap;}
</style>
</head>
<body>
<div class="box">
  <h2>🔧 GarageIQ — Debug Mode</h2>
  <p style="font-size:13px;color:#a0a09a;margin-bottom:1.5rem">Paste your Firebase URL and click Connect. Watch the log below.</p>
  <label style="font-size:12px;color:#a0a09a">Firebase Database URL</label>
  <input type="text" id="fb-url" placeholder="https://yourproject-default-rtdb.firebaseio.com">
  <button onclick="tryConnect()">Connect & Launch →</button>
  <div class="err" id="err"></div>
  <div class="log" id="log">Waiting...</div>
</div>

<script>
function log(msg){ document.getElementById('log').textContent += '\n' + msg; }
function err(msg){ var e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; }

window.onerror = function(msg,src,line){ log('ERROR line '+line+': '+msg); };

function tryConnect(){
  log('Button clicked');
  var url = document.getElementById('fb-url').value.trim().replace(/\/+$/,'');
  log('URL: ' + url);

  if(!url){ err('Please enter URL'); return; }
  if(url.indexOf('firebaseio')===-1){ err('Not a Firebase URL'); return; }

  log('Saving to localStorage...');
  try { localStorage.setItem('giq_fb_url', url); log('Saved OK'); } 
  catch(e){ log('localStorage error: '+e.message); }

  log('Fetching data from Firebase...');
  fetch(url + '/garageiq.json')
    .then(function(r){ 
      log('Response status: ' + r.status);
      return r.json(); 
    })
    .then(function(data){ 
      log('Data received: ' + JSON.stringify(data).substring(0,100));
      log('SUCCESS — Firebase is working!');
      log('Redirecting to app in 2 seconds...');
      setTimeout(function(){ window.location.reload(); }, 2000);
    })
    .catch(function(e){ 
      log('Fetch error: ' + e.message);
      err('Cannot reach Firebase: ' + e.message);
    });
}

// Check if already connected
var saved = localStorage.getItem('giq_fb_url');
if(saved){
  log('Found saved URL: ' + saved);
  document.getElementById('fb-url').value = saved;
  log('Auto-connecting...');
  tryConnect();
} else {
  log('No saved URL found — please enter one above');
}
</script>
</body>
</html>
